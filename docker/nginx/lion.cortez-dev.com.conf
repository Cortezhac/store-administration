server {
    listen 80;
    server_name lion.cortez-dev.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name lion.cortez-dev.com;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Corregido: Ruta raíz unificada con la estructura de tu contenedor Laravel
    root /var/www/app/public;
    index index.php;

    # Security headers globales
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Docker DNS resolver (requerido para resolución en tiempo de ejecución)
    resolver 127.0.0.11 valid=10s;

    # PHP-FPM proxy configuration
    set $upstream_php_fpm store-php-fpm:9000;
    location ~ \.php$ {
        fastcgi_pass $upstream_php_fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Denegar acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Caché a largo plazo para assets de Vite/estáticos
    location ~ \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        access_log off;
        log_not_found off;
        
        # Volvemos a incluir los headers aquí para que no se pierdan en peticiones estáticas
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, immutable";
    }
}